<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>timeblocks V3</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <header class="topbar">
    <div>
      <h1>Timeblocks V3</h1>
    </div>

    <div class="topbar-actions">
      <div id="current-selection" class="topbar-selection">
        Aucune tâche sélectionnée
      </div>
    </div>
    
      <button id="eraser-btn" class="btn btn-secondary" type="button">
        Mode effacer : OFF
      </button>

      <button id="save-btn" class="btn" type="button">Sauvegarder</button>
      <button id="clear-planning-btn" class="btn btn-danger" type="button">
        Vider le planning
      </button>
    </div>
  </header>

  <main class="layout">
    <aside class="sidebar">
      <section class="panel">
        <h2>Liste de tâches</h2>

        <form id="task-form" class="task-form-compact">
          <input
            id="task-name"
            name="task-name"
            type="text"
            maxlength="40"
            placeholder="Nom de la tâche"
            required
          />

          <div class="task-form-row">
            <input
              id="task-color"
              name="task-color"
              type="color"
              value="#4f46e5"
              required
            />

            <button type="submit" class="btn btn-primary btn-add-task">
              Ajouter
            </button>
          </div>
        </form>

        <div class="tasks-window">
          <div id="tasks-list" class="tasks-list"></div>
        </div>
      </section>
    </aside>

    <section class="planner-section">
      <div class="planner-wrapper">
        <table class="planner planner-horizontal" id="planner">
          <thead>
            <tr>
              <th class="day-col sticky-head sticky-left">Jours \\ Heures</th>
              {% for hour in hours %}
                <th class="sticky-head hour-head">{{ "%02d"|format(hour) }}</th>
              {% endfor %}
            </tr>
          </thead>

          <tbody>
            {% for day in days %}
              {% set day_index = loop.index0 %}
              <tr>
                <th class="day-col sticky-left">{{ day }}</th>
                {% for hour in hours %}
                  <td
                    class="cell"
                    data-day-index="{{ day_index }}"
                    data-hour="{{ hour }}"
                    title="{{ day }} - {{ '%02d:00'|format(hour) }}"
                  ></td>
                {% endfor %}
              </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </section>
  </main>

  <script>
    window.TIMEBLOCKS_CONFIG = {
      days: {{ days|tojson }},
      hours: {{ hours|tojson }}
    };
  </script>
  <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
